runtime:
  max_steps: 150
  log_every: 5
  planning_dt: 0.25

trajectory_model:
  type: lattice_trajectory
  min_terminal_speed: 0.5
  max_terminal_speed: 15.0
  degree: 2
  num_control_points: 3
  min_mid_time: 1.2
  max_mid_time: 4.0
  min_mid_s_offset: 12.0
  min_mid_speed_floor: 3.0
  min_mid_time_ratio: 0.25
  max_mid_time_ratio: 0.85
  terminal_time_buffer: 0.5
  monotonic_lateral: false

optimizer:
  components: 2
  samples: 48
  iterations: 50
  elite_fraction: 0.25
  init_std: 0.22
  seed: 0
  early_stop: true
  min_iterations: 3
  convergence_window: 3
  cost_window_tol: 0.001
  theta_window_tol: 0.02
  component_sigma_tol: 0.08
  component_weight_tol: 0.15
  opponent_rank_gate: 0.35
  nash_check: true
  nash_regret_tol: 0.02
  nash_candidate_limit: 20
  nash_perturbation: 0.04
  joint_theta_window_tol: 0.05
  joint_cost_window_tol: 0.002

cost:
  road_edge_buffer: 1.0
  min_lateral_accel: -2.5
  max_lateral_accel: 2.5
  lateral_accel_zero_comfort: 1.2
  min_kappa: -0.2
  max_kappa: 0.2
  kappa_zero_comfort: 0.04
  min_dkappa: -0.08
  max_dkappa: 0.08
  dkappa_zero_comfort: 0.04
  min_lateral_jerk: -3.0
  max_lateral_jerk: 3.0
  lateral_jerk_zero_comfort: 1.0
  max_longitudinal_speed: 15.0
  speed_tracking_comfort: 2.5
  efficiency_progress_comfort: 8.0
  reference_lateral_comfort: 1.0
  trajectory_certificate_enabled: true

planner:
  type: parametric
  max_initial_anchors: 8
  mode_paths: 8
  objective_mode: vectorized
  warm_start: true

game:
  target_actor_id: target_lane_rear_vehicle
  target_actor_ids: []
  target_min_terminal_speed: 0.0
  target_max_terminal_speed: 15.0
  target_min_terminal_s_offset: -10.0
  target_max_terminal_s_offset: 25.0
  simulated_target_type: normal
  simulated_actor_types: {}
  min_type_probability_for_feasibility: 0.05
  max_exact_hypotheses: 81
  risk:
    expected_weight: 1.0
    cvar_weight: 0.35
    cvar_alpha: 0.25
  equilibrium:
    check_interval: 3
    regret_tol: 0.1
    material_type_probability: 0.05
    local_nash_samples: 16
    local_nash_perturbation: 0.05
    local_nash_seed: 1701
  continuation:
    enabled: true
    observation_time: 0.8
    position_sigma: 2.0
    speed_sigma: 1.0
    acceleration_sigma: 1.0
    score_scale: 500.0
    cost_weight: 100.0
  belief_filter:
    position_sigma: 0.8
    speed_sigma: 0.5
    acceleration_sigma: 0.6
    displacement_sigma: 0.5
    speed_delta_sigma: 0.35
    observation_window_seconds: 1.5
    evidence_gain: 0.4
    probability_floor: 0.02
    forgetting_factor: 0.005
  type_profiles:
    yielding:
      prior_probability: 0.30
      desired_speed_scale: 0.72
      min_follow_gap: 8.0
      time_headway: 1.7
      headway_comfort: 3.0
      min_terminal_s_offset: -18.0
      max_terminal_s_offset: 12.0
    normal:
      prior_probability: 0.45
      desired_speed_scale: 1.0
      min_follow_gap: 6.0
      time_headway: 1.2
      headway_comfort: 4.0
      min_terminal_s_offset: -10.0
      max_terminal_s_offset: 25.0
    aggressive:
      prior_probability: 0.25
      desired_speed_scale: 1.18
      min_follow_gap: 3.5
      time_headway: 0.7
      headway_comfort: 5.0
      min_terminal_s_offset: -2.0
      max_terminal_s_offset: 36.0

visualization:
  save_frame: null
  save_mp4: null
  mp4_fps: 10.0
  pause: 0.08
  show: false
