runtime:
  max_steps: 150
  log_every: 5
  planning_dt: 0.25

trajectory_model:
  type: lattice_trajectory
  min_terminal_speed: 0.5
  max_terminal_speed: 15.0
  degree: 2
  num_control_points: 3
  min_mid_time: 1.2
  max_mid_time: 4.0
  min_mid_s_offset: 12.0
  min_mid_speed_floor: 3.0
  min_mid_time_ratio: 0.25
  max_mid_time_ratio: 0.85
  terminal_time_buffer: 0.5
  monotonic_lateral: false

optimizer:
  components: 2
  samples: 48
  iterations: 50
  elite_fraction: 0.25
  init_std: 0.22
  seed: 0
  early_stop: true
  min_iterations: 3
  convergence_window: 3
  cost_window_tol: 0.001
  theta_window_tol: 0.02
  component_sigma_tol: 0.08
  component_weight_tol: 0.15
  max_anchor_samples: 128
  opponent_rank_gate: 0.35
  nash_check: true
  nash_regret_tol: 0.02
  nash_candidate_limit: 20
  nash_perturbation: 0.04
  joint_theta_window_tol: 0.05
  joint_cost_window_tol: 0.002

cost:
  road_edge_buffer: 1.0
  min_lateral_accel: -2.5
  max_lateral_accel: 2.5
  lateral_accel_zero_comfort: 1.2
  min_kappa: -0.2
  max_kappa: 0.2
  kappa_zero_comfort: 0.04
  min_dkappa: -0.08
  max_dkappa: 0.08
  dkappa_zero_comfort: 0.04
  min_lateral_jerk: -3.0
  max_lateral_jerk: 3.0
  lateral_jerk_zero_comfort: 1.0
  max_longitudinal_speed: 15.0
  speed_tracking_comfort: 2.5
  efficiency_progress_comfort: 8.0
  reference_lateral_comfort: 1.0
  trajectory_certificate_enabled: true

planner:
  type: parametric
  max_initial_anchors: 96
  mode_paths: 8
  objective_mode: auto
  warm_start: true

game:
  target_actor_id: target_lane_rear_vehicle
  target_min_terminal_speed: 0.0
  target_max_terminal_speed: 15.0
  target_min_terminal_s_offset: -10.0
  target_max_terminal_s_offset: 25.0

visualization:
  save_frame: null
  save_mp4: null
  mp4_fps: 10.0
  pause: 0.08
  show: false
